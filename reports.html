<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>HR Reports | HMR</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green: #2ecc71;
      --green-dark: #1a9e52;
      --green-light: #d4f7e4;
      --green-glow: rgba(46, 204, 113, 0.12);
      --red: #e74c3c;
      --amber: #f39c12;
      --blue: #3498db;
      --purple: #9b59b6;
      --bg: #f4f7f5;
      --surface: #ffffff;
      --surface2: #f0f4f1;
      --border: #e2ebe5;
      --text: #1a2e22;
      --text-secondary: #4a5f52;
      --muted: #7a9486;
      --sidebar-bg: #1a2e22;
      --sidebar-text: rgba(255, 255, 255, 0.7);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
      --radius: 18px;
      --radius-sm: 10px;
    }

    [data-theme="dark"] {
      --bg: #0f1412;
      --surface: #1a241f;
      --surface2: #1f2c26;
      --border: #2a3a32;
      --text: #ecfdf5;
      --text-secondary: #b8d9cc;
      --muted: #7e9a8c;
      --sidebar-bg: #0a100e;
      --sidebar-text: rgba(255, 255, 255, 0.65);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 12px 32px rgba(0,  , 0, 0.4);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 72px;
      background: var(--sidebar-bg);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 200;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar:hover {
      width: 260px;
    }

    .sidebar-logo {
      padding: 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }

    .logo-img {
      width: 45px;
      height: 45px;
      object-fit: contain;
      border-radius: 12px;
      background: white;
      padding: 5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      margin: 4px 8px;
      border-radius: 12px;
      color: var(--sidebar-text);
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-decoration: none;
    }

    .nav-item i {
      width: 24px;
      font-size: 18px;
      flex-shrink: 0;
    }

    .nav-item span {
      opacity: 0;
      transition: opacity 0.2s 0.05s;
    }

    .sidebar:hover .nav-item span {
      opacity: 1;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(46, 204, 113, 0.2);
      color: #fff;
    }

    .nav-item.active i {
      color: var(--green);
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
      overflow: hidden;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .user-details {
      opacity: 0;
      transition: opacity 0.2s;
    }

    .user-details h4 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .user-details p {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }

    .sidebar:hover .user-details {
      opacity: 1;
    }

    /* Main Content */
    .main {
      flex: 1;
      margin-left: 72px;
      min-width: 0;
      width: calc(100% - 72px);
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text);
      cursor: pointer;
    }

    .header-title h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .header-title p {
      font-size: 12px;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .theme-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 3px;
      gap: 2px;
    }

    .theme-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
    }

    .theme-btn.active {
      background: var(--surface);
      box-shadow: var(--shadow);
      color: var(--green);
    }

    .date-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    /* Content */
    .content-section {
      padding: 28px;
      max-width: 1600px;
    }

    /* Report Tabs */
    .report-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .report-tab {
      padding: 10px 28px;
      border-radius: 40px;
      background: var(--surface2);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .report-tab:hover {
      background: var(--green-light);
      color: var(--green-dark);
    }

    .report-tab.active {
      background: var(--green);
      color: white;
    }

    /* Filters Bar */
    .filters-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }

    .filter-group {
      flex: 1;
      min-width: 160px;
    }

    .filter-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .filter-group select,
    .filter-group input {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-group select:focus,
    .filter-group input:focus {
      outline: none;
      border-color: var(--green);
    }

    .date-range-group {
      display: flex;
      gap: 12px;
      flex: 2;
    }

    .date-range-group .filter-group {
      flex: 1;
    }

    .filter-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-filter {
      background: var(--green);
      border: none;
      padding: 10px 24px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }

    .btn-filter:hover {
      background: var(--green-dark);
      transform: translateY(-1px);
    }

    .btn-reset {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 40px;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-reset:hover {
      background: var(--border);
    }

    /* Action Bar */
    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
    }

    .entries-select {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 13px;
    }

    .entries-select select {
      border: none;
      outline: none;
      background: transparent;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
    }

    .search-box i {
      color: var(--muted);
    }

    .search-box input {
      border: none;
      outline: none;
      background: transparent;
      font-size: 13px;
      color: var(--text);
      width: 200px;
    }

    .export-btn {
      background: var(--green);
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }

    .export-btn:hover {
      background: var(--green-dark);
    }

    /* Table */
    .table-wrapper {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow-x: auto;
    }

    .report-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 800px;
    }

    .report-table th {
      text-align: left;
      padding: 14px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .report-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .report-table tr:hover {
      background: var(--surface2);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-present {
      background: rgba(46, 204, 113, 0.15);
      color: var(--green-dark);
    }

    .status-absent {
      background: rgba(231, 76, 60, 0.15);
      color: var(--red);
    }

    .status-late {
      background: rgba(243, 156, 18, 0.15);
      color: var(--amber);
    }

    .status-approved {
      background: rgba(46, 204, 113, 0.15);
      color: var(--green-dark);
    }

    .status-pending {
      background: rgba(243, 156, 18, 0.15);
      color: var(--amber);
    }

    /* Pagination */
    .pagination-container {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .page-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s;
    }

    .page-btn.active {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Toast */
    .toast-notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      border-left: 4px solid var(--green);
      z-index: 1300;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 150;
    }

    .overlay.show {
      display: block;
    }

    /* Export Modal */
    .export-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(3px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .export-modal-card {
      background: var(--surface);
      max-width: 500px;
      width: 90%;
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow-lg);
    }

    .export-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .export-modal-header h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--muted);
    }

    .export-form-field {
      margin-bottom: 20px;
    }

    .export-form-field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .export-form-field select,
    .export-form-field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
    }

    .date-range-group-modal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .export-modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .export-cancel-btn {
      padding: 10px 24px;
      border-radius: 40px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
    }

    .export-confirm-btn {
      padding: 10px 28px;
      border-radius: 40px;
      background: var(--green);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 260px;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main {
        margin-left: 0;
        width: 100%;
      }
      .menu-btn {
        display: block;
      }
      .content-section {
        padding: 16px;
      }
      .filters-bar {
        flex-direction: column;
      }
      .date-range-group {
        flex-direction: column;
        width: 100%;
      }
      .filter-group {
        width: 100%;
      }
      .action-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .date-badge {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-img" style="background: white; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; color: var(--green-dark);">HMR</div>
      </div>
      <a href="#" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a href="#" class="nav-item"><i class="fas fa-users"></i><span>Employees</span></a>
      <a href="#" class="nav-item"><i class="fas fa-briefcase"></i><span>Organizations</span></a>
      <a href="#" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
      <a href="#" class="nav-item"><i class="fas fa-file-signature"></i><span>Agreements</span></a>
      <a href="#" class="nav-item"><i class="fas fa-calendar-check"></i><span>Leaves</span></a>
      <div class="nav-item active"><i class="fas fa-chart-simple"></i><span>Reports</span></div>
      <a href="#" class="nav-item"><i class="fas fa-gear"></i><span>Settings</span></a>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">HR</div>
          <div class="user-details">
            <h4>HR Admin</h4>
            <p>Administrator</p>
          </div>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="header">
        <div class="header-left">
          <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <div class="header-title">
            <h1>Reports</h1>
            <p>Comprehensive HR Analytics</p>
          </div>
        </div>
        <div class="header-right">
          <div class="date-badge"><i class="far fa-calendar-alt"></i> <span id="liveDate"></span></div>
          <div class="theme-toggle">
            <button class="theme-btn" id="lightBtn" onclick="setTheme('light')"><i class="fas fa-sun"></i></button>
            <button class="theme-btn" id="darkBtn" onclick="setTheme('dark')"><i class="fas fa-moon"></i></button>
          </div>
          <div class="avatar">HR</div>
        </div>
      </header>

      <div class="content-section">
        <!-- Report Type Tabs -->
        <div class="report-tabs">
          <div class="report-tab active" data-tab="attendance"><i class="fas fa-fingerprint"></i> Attendance Report</div>
          <div class="report-tab" data-tab="leave"><i class="fas fa-calendar-check"></i> Leave Report</div>
          <div class="report-tab" data-tab="employee"><i class="fas fa-users"></i> Employee Report</div>
        </div>

        <!-- Advanced Filters -->
        <div class="filters-bar">
          <div class="filter-group">
            <label><i class="fas fa-user"></i> Employee</label>
            <select id="employeeFilter">
              <option value="">All Employees</option>
            </select>
          </div>
          <div class="filter-group">
            <label><i class="fas fa-building"></i> Department</label>
            <select id="deptFilter">
              <option value="">All Departments</option>
              <option>IT</option><option>HR</option><option>Finance</option><option>Operations</option><option>Sales</option>
            </select>
          </div>
          <div class="date-range-group">
            <div class="filter-group">
              <label><i class="fas fa-calendar-alt"></i> From Date</label>
              <input type="date" id="fromDate">
            </div>
            <div class="filter-group">
              <label><i class="fas fa-calendar-alt"></i> To Date</label>
              <input type="date" id="toDate">
            </div>
          </div>
          <div class="filter-actions">
            <button class="btn-filter" onclick="applyFilters()"><i class="fas fa-filter"></i> Apply</button>
            <button class="btn-reset" onclick="resetFilters()"><i class="fas fa-undo-alt"></i> Reset</button>
          </div>
        </div>

        <!-- Action Bar -->
        <div class="action-bar">
          <div class="entries-select">
            <span>Show</span>
            <select id="entriesSelect" onchange="changeEntriesPerPage()">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
            <span>entries</span>
          </div>
          <div style="display: flex; gap: 12px;">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input type="text" id="searchInput" placeholder="Search records..." onkeyup="filterTable()">
            </div>
            <button class="export-btn" onclick="openExportModal()"><i class="fas fa-download"></i> Export</button>
          </div>
        </div>

        <!-- Report Table -->
        <div class="table-wrapper">
          <table class="report-table" id="reportTable">
            <thead id="tableHeader">
              <tr><th>S.No</th><th>Employee</th><th>Date</th><th>Punch In</th><th>Punch Out</th><th>Status</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-container">
          <div id="pageInfo" style="font-size: 12px; color: var(--muted);"></div>
          <div class="page-buttons" id="paginationButtons"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Export Modal -->
  <div id="exportModal" class="export-modal">
    <div class="export-modal-card">
      <div class="export-modal-header">
        <h3><i class="fas fa-download"></i> Export Report</h3>
        <button class="close-modal" onclick="closeExportModal()">&times;</button>
      </div>
      <div class="export-form-field">
        <label><i class="fas fa-file-alt"></i> Report Type</label>
        <select id="exportReportType">
          <option value="attendance">Attendance Report</option>
          <option value="leave">Leave Report</option>
          <option value="employee">Employee Report</option>
        </select>
      </div>
      <div class="export-form-field">
        <label><i class="fas fa-calendar-alt"></i> Date Range</label>
        <select id="exportDateRange" onchange="toggleExportDateRange()">
          <option value="daily">Today</option>
          <option value="weekly">This Week</option>
          <option value="monthly">This Month</option>
          <option value="custom">Custom Range</option>
        </select>
      </div>
      <div id="exportCustomRange" style="display: none;">
        <div class="date-range-group-modal">
          <div class="export-form-field"><label>From</label><input type="date" id="exportFromDate"></div>
          <div class="export-form-field"><label>To</label><input type="date" id="exportToDate"></div>
        </div>
      </div>
      <div class="export-form-field">
        <label><i class="fas fa-file-export"></i> Format</label>
        <select id="exportFormat">
          <option value="csv">CSV</option>
          <option value="excel">Excel (XLSX)</option>
        </select>
      </div>
      <div class="export-modal-buttons">
        <button class="export-cancel-btn" onclick="closeExportModal()">Cancel</button>
        <button class="export-confirm-btn" onclick="exportReport()"><i class="fas fa-download"></i> Export Now</button>
      </div>
    </div>
  </div>

  <script>
    // Sample Data
    const employeesList = [
      "JITHIN", "FAWZY", "FAHEEM", "ASLAN", "ABHILASH", "AKSHAY", "VIJAY", "SUNEEL",
      "SUBHANI", "SENTHIL", "SHANOOB", "ILYAS", "SAFFY", "IFTIKAR", "PRASHANT", "SARUN"
    ];
    const departments = ["IT", "HR", "Finance", "Operations", "Sales"];

    let attendanceRecords = [];
    let leaveRecords = [];
    let employeeRecords = [];

    // Generate sample data
    function generateData() {
      const today = new Date();
      for (let i = 0; i < 60; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() - i);
        const dateStr = date.toISOString().split('T')[0];
        
        employeesList.forEach((emp, idx) => {
          const rand = Math.random();
          const isPresent = rand > 0.25;
          const isLate = isPresent && rand > 0.75;
          const punchIn = isPresent ? `${7 + Math.floor(Math.random() * 2)}:${Math.floor(Math.random() * 60).toString().padStart(2, '0')}` : "-";
          const punchOut = isPresent ? `${16 + Math.floor(Math.random() * 3)}:${Math.floor(Math.random() * 60).toString().padStart(2, '0')}` : "-";
          
          attendanceRecords.push({
            id: attendanceRecords.length + 1,
            employee: emp,
            department: departments[idx % departments.length],
            date: dateStr,
            punchIn: punchIn,
            punchOut: punchOut,
            status: !isPresent ? "Absent" : (isLate ? "Late" : "Present")
          });
        });
      }

      // Leave Records
      const leaveTypes = ["Sick Leave", "Annual Leave", "Emergency Leave", "Casual Leave"];
      employeesList.forEach(emp => {
        const numLeaves = Math.floor(Math.random() * 5) + 1;
        for (let i = 0; i < numLeaves; i++) {
          const startDate = new Date();
          startDate.setDate(startDate.getDate() - Math.floor(Math.random() * 60));
          const endDate = new Date(startDate);
          endDate.setDate(startDate.getDate() + Math.floor(Math.random() * 5) + 1);
          leaveRecords.push({
            id: leaveRecords.length + 1,
            employee: emp,
            department: departments[Math.floor(Math.random() * departments.length)],
            leaveType: leaveTypes[Math.floor(Math.random() * leaveTypes.length)],
            fromDate: startDate.toISOString().split('T')[0],
            toDate: endDate.toISOString().split('T')[0],
            days: Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1,
            status: Math.random() > 0.2 ? "Approved" : "Pending"
          });
        }
      });

      // Employee Records
      employeesList.forEach((emp, idx) => {
        employeeRecords.push({
          id: idx + 1,
          name: emp,
          department: departments[idx % departments.length],
          designation: ["Manager", "Senior Executive", "Executive", "Analyst", "Coordinator"][idx % 5],
          joiningDate: "2023-01-01",
          status: "Active"
        });
      });
    }

    generateData();

    let currentTab = "attendance";
    let currentPage = 1;
    let perPage = 10;
    let searchTerm = "";
    let currentFilters = { employee: "", department: "", fromDate: "", toDate: "" };

    // Populate employee filter
    function populateFilters() {
      const empSelect = document.getElementById('employeeFilter');
      empSelect.innerHTML = '<option value="">All Employees</option>' + employeesList.map(e => `<option value="${e}">${e}</option>`).join('');
      
      const today = new Date();
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(today.getDate() - 30);
      document.getElementById('fromDate').value = thirtyDaysAgo.toISOString().split('T')[0];
      document.getElementById('toDate').value = today.toISOString().split('T')[0];
      
      document.getElementById('exportFromDate').value = thirtyDaysAgo.toISOString().split('T')[0];
      document.getElementById('exportToDate').value = today.toISOString().split('T')[0];
    }

    function getFilteredData() {
      let data;
      if (currentTab === "attendance") data = [...attendanceRecords];
      else if (currentTab === "leave") data = [...leaveRecords];
      else data = [...employeeRecords];

      if (currentFilters.employee) {
        data = data.filter(r => r.employee === currentFilters.employee);
      }
      if (currentFilters.department && currentTab !== "employee") {
        data = data.filter(r => r.department === currentFilters.department);
      }
      if (currentFilters.fromDate && currentTab !== "employee") {
        data = data.filter(r => r.date >= currentFilters.fromDate || (r.fromDate && r.fromDate >= currentFilters.fromDate));
      }
      if (currentFilters.toDate && currentTab !== "employee") {
        data = data.filter(r => r.date <= currentFilters.toDate || (r.toDate && r.toDate <= currentFilters.toDate));
      }
      if (searchTerm) {
        data = data.filter(r => JSON.stringify(r).toLowerCase().includes(searchTerm.toLowerCase()));
      }
      return data;
    }

    function updateTableHeaders() {
      const thead = document.getElementById('tableHeader');
      if (currentTab === "attendance") {
        thead.innerHTML = `<th>S.No</th><th>Employee</th><th>Department</th><th>Date</th><th>Punch In</th><th>Punch Out</th><th>Status</th>`;
      } else if (currentTab === "leave") {
        thead.innerHTML = `<th>S.No</th><th>Employee</th><th>Department</th><th>Leave Type</th><th>From Date</th><th>To Date</th><th>Days</th><th>Status</th>`;
      } else {
        thead.innerHTML = `<th>S.No</th><th>Employee Name</th><th>Department</th><th>Designation</th><th>Joining Date</th><th>Status</th>`;
      }
    }

    function renderTable() {
      const filtered = getFilteredData();
      const totalPages = Math.ceil(filtered.length / perPage);
      const start = (currentPage - 1) * perPage;
      const pageItems = filtered.slice(start, start + perPage);
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      if (currentTab === "attendance") {
        pageItems.forEach((item, idx) => {
          let statusClass = item.status === "Present" ? "status-present" : (item.status === "Late" ? "status-late" : "status-absent");
          tbody.innerHTML += `<tr><td>${start + idx + 1}</td><td><strong>${item.employee}</strong></td><td>${item.department}</td><td>${item.date}</td><td>${item.punchIn}</td><td>${item.punchOut}</td><td><span class="status-badge ${statusClass}">${item.status}</span></td></tr>`;
        });
      } else if (currentTab === "leave") {
        pageItems.forEach((item, idx) => {
          let statusClass = item.status === "Approved" ? "status-present" : "status-pending";
          tbody.innerHTML += `<tr><td>${start + idx + 1}</td><td><strong>${item.employee}</strong></td><td>${item.department}</td><td>${item.leaveType}</td><td>${item.fromDate}</td><td>${item.toDate}</td><td>${item.days}</td><td><span class="status-badge ${statusClass}">${item.status}</span></td></tr>`;
        });
      } else {
        pageItems.forEach((item, idx) => {
          tbody.innerHTML += `<tr><td>${start + idx + 1}</td><td><strong>${item.name}</strong></td><td>${item.department}</td><td>${item.designation}</td><td>${item.joiningDate}</td><td><span class="status-badge status-present">${item.status}</span></td></tr>`;
        });
      }

      document.getElementById('pageInfo').innerHTML = `Showing ${filtered.length ? start + 1 : 0} to ${Math.min(start + perPage, filtered.length)} of ${filtered.length} entries`;
      
      const total = Math.ceil(filtered.length / perPage);
      let btns = `<button class="page-btn" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
      for (let i = 1; i <= Math.min(total, 5); i++) {
        btns += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      if (total > 5) btns += `<button class="page-btn" onclick="goToPage(${total})">${total}</button>`;
      btns += `<button class="page-btn" onclick="changePage(1)" ${currentPage === total || total === 0 ? 'disabled' : ''}>›</button>`;
      document.getElementById('paginationButtons').innerHTML = btns;
    }

    function applyFilters() {
      currentFilters = {
        employee: document.getElementById('employeeFilter').value,
        department: document.getElementById('deptFilter').value,
        fromDate: document.getElementById('fromDate').value,
        toDate: document.getElementById('toDate').value
      };
      currentPage = 1;
      renderTable();
      showToast("Filters applied successfully");
    }

    function resetFilters() {
      document.getElementById('employeeFilter').value = "";
      document.getElementById('deptFilter').value = "";
      const today = new Date();
      const thirtyDaysAgo = new Date(today);
      thirtyDaysAgo.setDate(today.getDate() - 30);
      document.getElementById('fromDate').value = thirtyDaysAgo.toISOString().split('T')[0];
      document.getElementById('toDate').value = today.toISOString().split('T')[0];
      currentFilters = { employee: "", department: "", fromDate: "", toDate: "" };
      searchTerm = "";
      document.getElementById('searchInput').value = "";
      currentPage = 1;
      renderTable();
      showToast("Filters reset");
    }

    function filterTable() {
      searchTerm = document.getElementById('searchInput').value;
      currentPage = 1;
      renderTable();
    }

    function changePage(delta) {
      const filtered = getFilteredData();
      const totalPages = Math.ceil(filtered.length / perPage);
      const newPage = currentPage + delta;
      if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        renderTable();
      }
    }

    function goToPage(page) {
      currentPage = page;
      renderTable();
    }

    function changeEntriesPerPage() {
      perPage = parseInt(document.getElementById('entriesSelect').value);
      currentPage = 1;
      renderTable();
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast-notification';
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function openExportModal() {
      document.getElementById('exportModal').style.display = 'flex';
    }

    function closeExportModal() {
      document.getElementById('exportModal').style.display = 'none';
    }

    function toggleExportDateRange() {
      const range = document.getElementById('exportDateRange').value;
      document.getElementById('exportCustomRange').style.display = range === 'custom' ? 'block' : 'none';
    }

    function exportReport() {
      const reportType = document.getElementById('exportReportType').value;
      const range = document.getElementById('exportDateRange').value;
      const format = document.getElementById('exportFormat').value;
      showToast(`Exporting ${reportType} report in ${format.toUpperCase()} format...`);
      setTimeout(() => {
        showToast("Report exported successfully!");
        closeExportModal();
      }, 1500);
    }

    // Tab switching
    document.querySelectorAll('.report-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentTab = this.dataset.tab;
        updateTableHeaders();
        currentPage = 1;
        renderTable();
      });
    });

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('hr-theme', theme);
      document.getElementById('lightBtn').classList.toggle('active', theme === 'light');
      document.getElementById('darkBtn').classList.toggle('active', theme === 'dark');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('show');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    document.getElementById('liveDate').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    
    const savedTheme = localStorage.getItem('hr-theme') || 'light';
    setTheme(savedTheme);
    populateFilters();
    updateTableHeaders();
    renderTable();
  </script>
</body>

</html>
