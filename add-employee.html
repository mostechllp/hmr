<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Add Employee | HR Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green: #2ecc71;
      --green-dark: #1a9e52;
      --green-light: #d4f7e4;
      --green-glow: rgba(46, 204, 113, 0.12);
      --red: #e74c3c;
      --amber: #f39c12;
      --blue: #3498db;
      --purple: #9b59b6;
      --yellow: #f1c40f;
      --yellow-light: #fff9e6;
      --bg: #f4f7f5;
      --surface: #ffffff;
      --surface2: #f0f4f1;
      --border: #e2ebe5;
      --text: #1a2e22;
      --text-secondary: #4a5f52;
      --muted: #7a9486;
      --sidebar-bg: #1a2e22;
      --sidebar-text: rgba(255, 255, 255, 0.7);
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
      --radius: 18px;
      --radius-sm: 10px;
    }

    [data-theme="dark"] {
      --bg: #0f1412;
      --surface: #1a241f;
      --surface2: #1f2c26;
      --border: #2a3a32;
      --text: #ecfdf5;
      --text-secondary: #b8d9cc;
      --muted: #7e9a8c;
      --sidebar-bg: #0a100e;
      --sidebar-text: rgba(255, 255, 255, 0.65);
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 72px;
      background: var(--sidebar-bg);
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 200;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar:hover {
      width: 260px;
    }

    .sidebar-logo {
      padding: 20px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
    }

    .logo-img {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 10px;
      background: white;
      padding: 4px;
    }

    .sidebar:hover .logo-img {
      width: 50px;
      height: 50px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      margin: 4px 8px;
      border-radius: 12px;
      color: var(--sidebar-text);
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
      text-decoration: none;
    }

    .nav-item i {
      width: 24px;
      font-size: 18px;
    }

    .nav-item span {
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sidebar:hover .nav-item span {
      opacity: 1;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(46, 204, 113, 0.2);
      color: #fff;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .user-details {
      opacity: 0;
      transition: opacity 0.2s;
    }

    .user-details h4 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }

    .user-details p {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
    }

    .sidebar:hover .user-details {
      opacity: 1;
    }

    /* Main Content */
    .main {
      flex: 1;
      margin-left: 72px;
      min-width: 0;
      width: calc(100% - 72px);
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      font-size: 20px;
      color: var(--text);
      cursor: pointer;
    }

    .header-title h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .header-title p {
      font-size: 11px;
      color: var(--muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 3px;
      gap: 2px;
    }

    .theme-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
    }

    .theme-btn.active {
      background: var(--surface);
      box-shadow: var(--shadow);
      color: var(--green);
    }

    .date-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Content Section - Add Employee Form */
    .content-section {
      padding: 28px 28px 40px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h2 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--green-dark));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }

    /* Step Indicator */
    .step-indicator {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .step-btn {
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .step-btn.active {
      background: var(--green);
      color: white;
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
    }

    .step-btn.completed {
      color: var(--green);
    }

    /* Form Container */
    .form-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
    }

    .form-step {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .form-step.active-step {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--green-light);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field.full-width {
      grid-column: span 2;
    }

    .form-field label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-field label i {
      color: var(--green);
      margin-right: 6px;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      transition: all 0.2s;
    }

    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-glow);
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: var(--muted);
    }

    /* Tabs inside steps */
    .sub-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .sub-tab {
      padding: 8px 20px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--surface2);
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .sub-tab.active {
      background: var(--green);
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active-tab {
      display: block;
    }

    /* Navigation Buttons */
    .form-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .nav-btn {
      padding: 12px 32px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
    }

    .nav-btn.prev {
      background: var(--surface2);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .nav-btn.next,
    .nav-btn.submit {
      background: var(--green);
      color: white;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .nav-btn.prev:hover {
      background: var(--border);
    }

    .nav-btn.next:hover,
    .nav-btn.submit:hover {
      background: var(--green-dark);
    }

    /* Toast */
    .toast-notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      border-left: 4px solid var(--green);
      z-index: 1300;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        width: 260px;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main {
        margin-left: 0;
        width: 100%;
      }
      .menu-btn {
        display: block;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .form-field.full-width {
        grid-column: span 1;
      }
      .content-section {
        padding: 20px 16px;
      }
      .form-container {
        padding: 20px;
      }
      .step-indicator {
        border-radius: 20px;
      }
      .step-btn {
        padding: 6px 16px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <img src="https://violet-leopard-500489.hostingersite.com/hr/public/assets/images/hr-logo2.jpg" alt="HMR Logo" class="logo-img">
      </div>
      <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
      <a href="employees.html" class="nav-item"><i class="fas fa-users"></i><span>Employees</span></a>
      <div class="nav-item active"><i class="fas fa-user-plus"></i><span>Add Employee</span></div>
      <a href="organizations.html" class="nav-item"><i class="fas fa-briefcase"></i><span>Organizations</span></a>
      <a href="attendances.html" class="nav-item"><i class="fas fa-fingerprint"></i><span>Attendance</span></a>
      <a href="leaves.html" class="nav-item"><i class="fas fa-calendar-check"></i><span>Leaves</span></a>
      <div class="nav-item"><i class="fas fa-chart-line"></i><span>Reports</span></div>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">HR</div>
          <div class="user-details">
            <h4>HR Admin</h4>
            <p>Administrator</p>
          </div>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="header">
        <div class="header-left">
          <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
          <div class="header-title">
            <h1>Add Employee</h1>
            <p>Complete employee profile information</p>
          </div>
        </div>
        <div class="header-right">
          <div class="date-badge"><i class="far fa-calendar-alt"></i> <span id="liveDate"></span></div>
          <div class="theme-toggle">
            <button class="theme-btn" id="lightBtn" onclick="setTheme('light')"><i class="fas fa-sun"></i></button>
            <button class="theme-btn" id="darkBtn" onclick="setTheme('dark')"><i class="fas fa-moon"></i></button>
          </div>
          <div class="avatar">
            <img src="https://violet-leopard-500489.hostingersite.com/hr/public/storage/avatars/jnBiWzD1Lt4YMtHS4hK2CS0Pcbo3vSOZw7Xd6px4.jpg" />
          </div>
        </div>
      </header>

      <div class="content-section">
        <div class="page-header">
          <h2><i class="fas fa-user-plus"></i> Add New Employee</h2>
        </div>

        <!-- Step Indicator -->
        <div class="step-indicator">
          <button class="step-btn active" data-step="0">1. Basic Info</button>
          <button class="step-btn" data-step="1">2. Passport</button>
          <button class="step-btn" data-step="2">3. Visa & Labor</button>
          <button class="step-btn" data-step="3">4. EID</button>
          <button class="step-btn" data-step="4">5. Contact & Others</button>
        </div>

        <!-- Multi-Step Form -->
        <div class="form-container">
          <form id="employeeForm" onsubmit="saveEmployeeData(event)">
            <!-- Step 1: Basic Info -->
            <div class="form-step active-step" data-step="0">
              <div class="form-section-title">
                <i class="fas fa-user-circle"></i> Basic Information
              </div>
              <div class="form-grid">
                <div class="form-field full-width">
                  <label><i class="fas fa-user"></i> Full Name *</label>
                  <input type="text" id="fullName" placeholder="Enter full name" value="John Doe">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-building"></i> Organization</label>
                  <input type="text" id="organization" placeholder="Enter organization name" value="THESAY">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-briefcase"></i> Designation</label>
                  <input type="text" id="designation" placeholder="Enter designation" value="Software Engineer">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-venus-mars"></i> Gender</label>
                  <select id="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="form-field">
                  <label><i class="fas fa-gift"></i> Special Days</label>
                  <input type="text" id="specialDays" placeholder="e.g. Birthday / Anniversary" value="15 May">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-building"></i> Company *</label>
                  <select id="company">
                    <option value="THESAY">THESAY</option>
                    <option value="Tech Corp">Tech Corp</option>
                    <option value="Innovate Ltd">Innovate Ltd</option>
                  </select>
                </div>
                <div class="form-field">
                  <label><i class="fas fa-diagram-project"></i> Department</label>
                  <select id="department">
                    <option value="IT">IT</option>
                    <option value="HR">HR</option>
                    <option value="Finance">Finance</option>
                    <option value="Operations">Operations</option>
                  </select>
                </div>
                <div class="form-field">
                  <label><i class="fas fa-id-card"></i> Employee ID</label>
                  <input type="text" id="employeeId" placeholder="Enter employee ID" value="EMP001">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar"></i> Date of Birth</label>
                  <input type="date" id="dob" value="1990-05-15">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-week"></i> Leave Allocation (Days)</label>
                  <input type="number" id="leaveAllocation" value="30">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-alt"></i> Joining Date</label>
                  <input type="date" id="joiningDate" value="2024-01-01">
                </div>
              </div>
            </div>

            <!-- Step 2: Passport Details (with sub-tabs) -->
            <div class="form-step" data-step="1">
              <div class="form-section-title">
                <i class="fas fa-passport"></i> Passport Information
              </div>
              <div class="form-grid">
                <div class="form-field full-width">
                  <label><i class="fas fa-user-tag"></i> Passport Full Name</label>
                  <input type="text" id="passportFullName" placeholder="Enter name as per passport" value="John Doe">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-hashtag"></i> Passport Number</label>
                  <input type="text" id="passportNumber" placeholder="Enter passport number" value="A12345678">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-plus"></i> Issued Date</label>
                  <input type="date" id="passportIssued" value="2020-01-01">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-times"></i> Expiry Date</label>
                  <input type="date" id="passportExpiry" value="2030-01-01">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-father"></i> Father's Name</label>
                  <input type="text" id="fatherName" placeholder="Enter father's name" value="Robert Doe">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-mother"></i> Mother's Name</label>
                  <input type="text" id="motherName" placeholder="Enter mother's name" value="Jane Doe">
                </div>
                <div class="form-field full-width">
                  <label><i class="fas fa-map-marker-alt"></i> Address</label>
                  <textarea id="address" rows="2" placeholder="Enter full address">Dubai, UAE</textarea>
                </div>
                <div class="form-field">
                  <label><i class="fas fa-globe"></i> Issued From</label>
                  <input type="text" id="issuedFrom" placeholder="Enter issuing country/city" value="Dubai, UAE">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-map-pin"></i> Place of Birth</label>
                  <input type="text" id="placeOfBirth" placeholder="Enter place of birth" value="Dubai">
                </div>
              </div>
            </div>

            <!-- Step 3: Visa & Labor Details -->
            <div class="form-step" data-step="2">
              <div class="form-section-title">
                <i class="fas fa-file-contract"></i> Visa & Labor Details
              </div>
              <div class="form-grid">
                <div class="form-field">
                  <label><i class="fas fa-id-card"></i> Visa Number</label>
                  <input type="text" id="visaNumber" placeholder="Enter Visa Number" value="VISA123456">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-plus"></i> Visa Issued Date</label>
                  <input type="date" id="visaIssued" value="2024-01-01">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-times"></i> Visa Expiry Date</label>
                  <input type="date" id="visaExpiry" value="2026-01-01">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-briefcase"></i> Labor Number</label>
                  <input type="text" id="laborNumber" placeholder="Enter Labor Number" value="LAB987654">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-plus"></i> Labor Issued Date</label>
                  <input type="date" id="laborIssued" value="2024-01-01">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-times"></i> Labor Expiry Date</label>
                  <input type="date" id="laborExpiry" value="2026-01-01">
                </div>
              </div>
            </div>

            <!-- Step 4: EID Details -->
            <div class="form-step" data-step="3">
              <div class="form-section-title">
                <i class="fas fa-id-card"></i> Emirates ID (EID)
              </div>
              <div class="form-grid">
                <div class="form-field full-width">
                  <label><i class="fas fa-qrcode"></i> EID Number</label>
                  <input type="text" id="eidNumber" placeholder="Enter EID number" value="784-2024-1234567-8">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-plus"></i> Issued Date</label>
                  <input type="date" id="eidIssued" value="2024-02-01">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-calendar-times"></i> Expiry Date</label>
                  <input type="date" id="eidExpiry" value="2029-02-01">
                </div>
              </div>
            </div>

            <!-- Step 5: Contact & Others -->
            <div class="form-step" data-step="4">
              <div class="form-section-title">
                <i class="fas fa-address-card"></i> Contact Information & Others
              </div>
              <div class="form-grid">
                <div class="form-field">
                  <label><i class="fas fa-users"></i> Dependents</label>
                  <select id="dependents">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3+">3+</option>
                  </select>
                </div>
                <div class="form-field">
                  <label><i class="fas fa-envelope"></i> Company Email</label>
                  <input type="email" id="companyEmail" placeholder="name@company.com" value="john@thesay.ae">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-phone"></i> Personal Number</label>
                  <input type="tel" id="personalNumber" placeholder="Enter personal phone number" value="+971501234567">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-envelope"></i> Personal Email</label>
                  <input type="email" id="personalEmail" placeholder="name@gmail.com" value="john@gmail.com">
                </div>
                <div class="form-field">
                  <label><i class="fas fa-phone-alt"></i> Other Number</label>
                  <input type="tel" id="otherNumber" placeholder="Enter alternate number" value="+971502345678">
                </div>
              </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="form-nav">
              <button type="button" class="nav-btn prev" id="prevBtn" onclick="changeStep(-1)"><i class="fas fa-arrow-left"></i> Previous</button>
              <button type="button" class="nav-btn next" id="nextBtn" onclick="changeStep(1)">Next <i class="fas fa-arrow-right"></i></button>
              <button type="submit" class="nav-btn submit" id="submitBtn" style="display: none;">Save Employee <i class="fas fa-check"></i></button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentStep = 0;
    const totalSteps = 5;

    function updateStepUI() {
      // Update step buttons
      document.querySelectorAll('.step-btn').forEach((btn, idx) => {
        btn.classList.remove('active');
        if (idx === currentStep) btn.classList.add('active');
        if (idx < currentStep) btn.classList.add('completed');
        else btn.classList.remove('completed');
      });
      
      // Update form steps
      document.querySelectorAll('.form-step').forEach((step, idx) => {
        if (idx === currentStep) step.classList.add('active-step');
        else step.classList.remove('active-step');
      });
      
      // Update navigation buttons
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const submitBtn = document.getElementById('submitBtn');
      
      prevBtn.style.display = currentStep === 0 ? 'none' : 'flex';
      
      if (currentStep === totalSteps - 1) {
        nextBtn.style.display = 'none';
        submitBtn.style.display = 'flex';
      } else {
        nextBtn.style.display = 'flex';
        submitBtn.style.display = 'none';
      }
    }

    function changeStep(delta) {
      const newStep = currentStep + delta;
      if (newStep >= 0 && newStep < totalSteps) {
        currentStep = newStep;
        updateStepUI();
      }
    }

    function showToast(message, isSuccess = true) {
      const existing = document.querySelector('.toast-notification');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast-notification';
      toast.innerHTML = `<i class="fas ${isSuccess ? 'fa-check-circle' : 'fa-info-circle'}" style="color: var(--green);"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function saveEmployeeData(event) {
      event.preventDefault();
      
      // Collect all form data (demo purpose, no validation)
      const employeeData = {
        fullName: document.getElementById('fullName').value,
        organization: document.getElementById('organization').value,
        designation: document.getElementById('designation').value,
        gender: document.getElementById('gender').value,
        specialDays: document.getElementById('specialDays').value,
        company: document.getElementById('company').value,
        department: document.getElementById('department').value,
        employeeId: document.getElementById('employeeId').value,
        dob: document.getElementById('dob').value,
        leaveAllocation: document.getElementById('leaveAllocation').value,
        joiningDate: document.getElementById('joiningDate').value,
        passportFullName: document.getElementById('passportFullName').value,
        passportNumber: document.getElementById('passportNumber').value,
        passportIssued: document.getElementById('passportIssued').value,
        passportExpiry: document.getElementById('passportExpiry').value,
        fatherName: document.getElementById('fatherName').value,
        motherName: document.getElementById('motherName').value,
        address: document.getElementById('address').value,
        issuedFrom: document.getElementById('issuedFrom').value,
        placeOfBirth: document.getElementById('placeOfBirth').value,
        visaNumber: document.getElementById('visaNumber').value,
        visaIssued: document.getElementById('visaIssued').value,
        visaExpiry: document.getElementById('visaExpiry').value,
        laborNumber: document.getElementById('laborNumber').value,
        laborIssued: document.getElementById('laborIssued').value,
        laborExpiry: document.getElementById('laborExpiry').value,
        eidNumber: document.getElementById('eidNumber').value,
        eidIssued: document.getElementById('eidIssued').value,
        eidExpiry: document.getElementById('eidExpiry').value,
        dependents: document.getElementById('dependents').value,
        companyEmail: document.getElementById('companyEmail').value,
        personalNumber: document.getElementById('personalNumber').value,
        personalEmail: document.getElementById('personalEmail').value,
        otherNumber: document.getElementById('otherNumber').value
      };
      
      // Store in localStorage for demo
      localStorage.setItem('lastAddedEmployee', JSON.stringify(employeeData));
      
      showToast(`✓ Employee "${employeeData.fullName}" added successfully! Redirecting...`, true);
      
      // Redirect to employees.html after short delay
      setTimeout(() => {
        window.location.href = 'employees.html';
      }, 1200);
    }

    // Step button click handlers
    document.querySelectorAll('.step-btn').forEach((btn, idx) => {
      btn.addEventListener('click', () => {
        currentStep = idx;
        updateStepUI();
      });
    });

    // Theme functions
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('hr-theme', theme);
      document.getElementById('lightBtn').classList.toggle('active', theme === 'light');
      document.getElementById('darkBtn').classList.toggle('active', theme === 'dark');
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function updateLiveDate() {
      const span = document.getElementById('liveDate');
      if (span) span.textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    // Close sidebar when clicking outside on mobile
    document.addEventListener('click', function(e) {
      const sidebar = document.getElementById('sidebar');
      const menuBtn = document.querySelector('.menu-btn');
      if (window.innerWidth <= 768 && sidebar && !sidebar.contains(e.target) && e.target !== menuBtn && !menuBtn?.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      updateLiveDate();
      const savedTheme = localStorage.getItem('hr-theme') || 'light';
      setTheme(savedTheme);
      updateStepUI();
    });
  </script>
</body>
</html>
